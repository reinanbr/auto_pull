# .github/workflows/ci.yml - Continuous integration pipeline for AutoPull.

name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Lint
        run: flake8 autopull tests

      - name: Test
        run: pytest -q

      - name: Install Debian packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dh-python devscripts fakeroot

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b
